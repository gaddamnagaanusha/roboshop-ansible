- name: create ec2 and route53 records
  hosts: all
  connection: local
  vars:
    sg_id: sg-085cf1fdfcefdb4c0
    ami_id: ami-0220d79f3f480ecf5
    env: dev
    instances:
    - mongobd
    - catalogue  
  tasks: 
   - name: create ec2 instance
     amazon.aws.ec2_instance:
       instance_type: t3.micro
       image_id: "{{ ami_id }}"
       security_group: "{{ sg_id }}"
       name: "{{ item }}"

       tags: 
         Project: roboshop
         Component: "{{ item }}"
         Environment: "{{ env }}"
         Name: "{{ item }}-{{ env }}"

     loop: "{{ instances }}"   
     register: ec2_output


  - name: ec2 instance creation
    ansible.builtin.debug:
      msg: "{{ ec2_output}}"

